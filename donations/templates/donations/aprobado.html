{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Donación aprobada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-gray-50 via-white to-gray-100 flex items-center justify-center min-h-screen">

<div class="max-w-md w-full bg-white shadow-xl rounded-2xl p-8 text-center">

    <!-- ICONO -->
    <div class="w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full bg-green-100">
        <span class="text-2xl">✅</span>
    </div>

    <!-- MENSAJE -->
    <h1 class="text-2xl font-bold mb-2">
        Donación aprobada
    </h1>

    <p class="text-gray-600 mb-6">
        {{ mensaje }}
    </p>

    <!-- REFERENCIA -->
    <div class="bg-gray-50 p-4 rounded-lg mb-6">
        <p class="text-sm text-gray-500">Referencia</p>
        <p class="font-semibold text-lg text-green-600">
            {{ donacion.referencia }}
        </p>
    </div>

    <!-- INFO -->
    <p class="text-sm text-gray-500 mb-6">
        El donante ha sido notificado automáticamente.
    </p>

    <!-- BOTÓN -->
    <a href="/"
       class="inline-block bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 transition font-semibold">
        Volver al inicio
    </a>

</div>

</body>
</html>
