<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>

<body style="margin:0; padding:0; background:#f4f4f4; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
<tr>
<td align="center">

<table width="520" cellpadding="0" cellspacing="0" style="background:white; margin:30px auto; border-radius:12px; overflow:hidden;">

    <!-- HEADER -->
    <tr>
        <td style="background:linear-gradient(135deg,#3b0a0a,#5a1e1e,#2b0f0f); padding:20px; text-align:center; color:white;">
            <h2 style="margin:0;">Donación confirmada</h2>
        </td>
    </tr>

    <!-- CONTENT -->
    <tr>
        <td style="padding:25px; text-align:center;">

            <h3 style="margin-bottom:10px;">¡Gracias por tu apoyo! 🙌</h3>

            <p style="color:#555; font-size:14px;">
                Hola {{ nombre }}, tu donación ha sido verificada y aprobada correctamente.
            </p>

            <!-- REFERENCIA -->
            <div style="margin:20px 0; padding:15px; background:#f9fafb; border-radius:8px;">
                <p style="margin:0; font-size:13px; color:#888;">Referencia</p>
                <p style="margin:5px 0 0; font-size:18px; font-weight:bold; color:#10b981;">
                    {{ referencia }}
                </p>
            </div>

            <p style="font-size:13px; color:#666;">
                Tu aporte ya está generando impacto en nuestras comunidades ❤️
            </p>

        </td>
    </tr>

    <!-- FOOTER -->
    <tr>
        <td style="background:#111; color:#aaa; text-align:center; padding:12px; font-size:12px;">
            © ANPC Foundation
        </td>
    </tr>

</table>

</td>
</tr>
</table>

</body>
</html>
